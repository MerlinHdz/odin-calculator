<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>Calculator</title>
        <link rel="stylesheet" href="./styles.css">
        <script src="./script.js" defer></script>
    </head>
    <body>
        <div id="calculator">
            <div class="display">
                <div class="display__expression" id="expression"></div>
                <div class="display__value" id="value">0</div>
            </div>

            <div class="buttons">
                <!-- row 1 -->
                 <div class="buttons__row">
                    <button class="btn btn__wide btn__deletion" id="btn-clear">AC</button>
                    <button class="btn btn__deletion" id="btn-backspace">⌫</button>
                    <button class="btn btn__operator" data-op="÷">÷</button>
                 </div>

                <!-- row 2 -->
                 <div class="buttons__row">
                    <button class="btn btn__digit" data-digit="7">7</button>
                    <button class="btn btn__digit" data-digit="8">8</button>
                    <button class="btn btn__digit" data-digit="9">9</button>
                    <button class="btn btn__operator" data-op="x">x</button>
                 </div>

                 <!-- row 3 -->
                  
                 <div class="buttons__row">
                    <button class="btn btn__digit" data-digit="4">4</button>
                    <button class="btn btn__digit" data-digit="5">5</button>
                    <button class="btn btn__digit" data-digit="6">6</button>
                    <button class="btn btn__operator" data-op="-">-</button>
                  </div>

                <!-- row 4 -->
                 <div class="buttons__row">
                    <button class="btn btn__digit" data-digit="1">1</button>
                    <button class="btn btn__digit" data-digit="2">2</button>
                    <button class="btn btn__digit" data-digit="3">3</button>
                    <button class="btn btn__operator" data-op="+">+</button>
                 </div>

                 <!-- row 5 -->
                 <div class="buttons__row">
                    <button class="btn btn__digit btn__wide" data-digit="0">0</button>
                    <button class="btn btn__digit" id="btn-decimal">.</button>
                    <button class="btn btn__operator" id="btn-equals">=</button>
                 </div>
            </div>
        </div>
    </body>
</html>
